services:
  db:
    image: mysql:8.0
    container_name: travel_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: travel_planner
      MYSQL_USER: travel
      MYSQL_PASSWORD: travel
    ports:
      # Host 3307 -> container 3306 (host 3306 is taken by a local MySQL).
      # The backend still reaches MySQL internally via db:3306.
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptravel"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: travel_backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: travel
      DB_PASSWORD: travel
      DB_NAME: travel_planner
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: travel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
